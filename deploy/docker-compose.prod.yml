services:
  db:
    image: postgres:17-alpine
    container_name: pe-be-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pe_be}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pe_be}
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pe-be-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pe-be-backend
    command:
      - uvicorn
      - src.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pe_be}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: https://${APP_DOMAIN}
      FRONTEND_POST_LOGIN_PATH: ${FRONTEND_POST_LOGIN_PATH:-/workouts}
      API_VERSION: v1
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://us.cloud.langfuse.com}
      CHAT_ATTACHMENT_STORAGE_DIR: /app/.chat_attachments
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chat_attachments:/app/.chat_attachments
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - pe-be-network

  frontend:
    build:
      context: ../pe-be-tracker-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-10000}
        VITE_ENABLE_LOGGING: ${VITE_ENABLE_LOGGING:-false}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST}
        VITE_ENVIRONMENT: production
    container_name: pe-be-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pe-be-network

  caddy:
    image: caddy:2-alpine
    container_name: pe-be-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - pe-be-network

volumes:
  postgres_data:
  chat_attachments:
  caddy_data:
  caddy_config:

networks:
  pe-be-network:
    driver: bridge
