<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PersonalBestie</title>
    <script>
      (() => {
        const sentryDsn = "%VITE_SENTRY_DSN%";

        if (sentryDsn) {
          try {
            const sentryOrigin = new URL(sentryDsn).origin;

            const dnsPrefetch = document.createElement("link");
            dnsPrefetch.rel = "dns-prefetch";
            dnsPrefetch.href = sentryOrigin;
            document.head.append(dnsPrefetch);

            const preconnect = document.createElement("link");
            preconnect.rel = "preconnect";
            preconnect.href = sentryOrigin;
            preconnect.crossOrigin = "anonymous";
            document.head.append(preconnect);
          } catch {
            // Ignore malformed or unset DSNs.
          }
        }

        const attachManifest = () => {
          if (document.head.querySelector('link[rel="manifest"]')) {
            return;
          }

          const manifest = document.createElement("link");
          manifest.rel = "manifest";
          manifest.href = "/manifest.json";
          document.head.append(manifest);
        };

        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(attachManifest, { timeout: 2000 });
        } else {
          window.addEventListener("load", attachManifest, { once: true });
        }
      })();
    </script>

    <!-- Apple Touch Icons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="PersonalBestie" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
