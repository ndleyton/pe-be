<svg width="800" height="1000" viewBox="0 0 800 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- This is a placeholder SVG. Please replace it with a detailed anatomical SVG. -->
  <!-- Ensure your detailed SVG has path or shape elements with the following IDs: -->

  <!-- Chest -->
  <rect id="pectorals" x="300" y="200" width="200" height="100" fill="#D3D3D3" opacity="0.5" />
  <rect id="chest-upper" x="300" y="180" width="200" height="20" fill="#D3D3D3" opacity="0.5" />
  <rect id="chest-lower" x="300" y="300" width="200" height="20" fill="#D3D3D3" opacity="0.5" />

  <!-- Back -->
  <rect id="latissimus" x="250" y="350" width="300" height="150" fill="#D3D3D3" opacity="0.5" />
  <rect id="trapezius" x="300" y="100" width="200" height="80" fill="#D3D3D3" opacity="0.5" />
  <rect id="rhomboids" x="320" y="250" width="160" height="70" fill="#D3D3D3" opacity="0.5" />

  <!-- Legs -->
  <rect id="quadriceps" x="350" y="600" width="100" height="200" fill="#D3D3D3" opacity="0.5" />
  <rect id="hamstrings" x="350" y="800" width="100" height="150" fill="#D3D3D3" opacity="0.5" />
  <rect id="calves" x="360" y="950" width="80" height="50" fill="#D3D3D3" opacity="0.5" />
  <rect id="glutes" x="320" y="500" width="160" height="100" fill="#D3D3D3" opacity="0.5" />

  <!-- Shoulders -->
  <circle id="anterior-deltoid" cx="280" cy="250" r="40" fill="#D3D3D3" opacity="0.5" />
  <circle id="posterior-deltoid" cx="520" cy="250" r="40" fill="#D3D3D3" opacity="0.5" />
  <circle id="lateral-deltoid" cx="400" cy="150" r="40" fill="#D3D3D3" opacity="0.5" />

  <!-- Arms -->
  <rect id="biceps" x="250" y="300" width="50" height="150" fill="#D3D3D3" opacity="0.5" />
  <rect id="triceps" x="500" y="300" width="50" height="150" fill="#D3D3D3" opacity="0.5" />
  <rect id="forearms" x="220" y="450" width="30" height="100" fill="#D3D3D3" opacity="0.5" />

  <!-- Core -->
  <rect id="abdominals" x="350" y="320" width="100" height="100" fill="#D3D3D3" opacity="0.5" />
  <rect id="obliques" x="300" y="320" width="50" height="100" fill="#D3D3D3" opacity="0.5" />

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="40" fill="#000000">REPLACE THIS SVG</text>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="20" fill="#000000">with a detailed anatomical diagram</text>
</svg>
