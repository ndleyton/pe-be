name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.get_version.outputs.version }}
        body: |
          ## Changes in ${{ steps.get_version.outputs.version }}

          ### 🚀 Features
          - List new features here

          ### 🐛 Bug Fixes
          - List bug fixes here

          ### 🔧 Improvements
          - List improvements here

          ### 📚 Documentation
          - List documentation updates here

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v1.0.0...${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false

  build-and-release:
    runs-on: ${{ fromJSON(vars.HEAVY_RUNNER_LABELS_JSON != '' && vars.HEAVY_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    needs: create-release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Build Frontend
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./pe-be-tracker-frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./pe-be-tracker-frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./pe-be-tracker-frontend
      run: npm run build

    - name: Package frontend build
      run: |
        cd pe-be-tracker-frontend/dist
        tar -czf ../../frontend-${{ needs.create-release.outputs.version }}.tar.gz .
        cd ../..

    # Build Backend
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Build backend (sdist/wheel)
      working-directory: ./backend
      run: |
        uvx build

    - name: Build Docker image
      run: |
        docker build -t pe-be-backend:${{ needs.create-release.outputs.version }} ./backend
        docker save pe-be-backend:${{ needs.create-release.outputs.version }} | gzip > backend-${{ needs.create-release.outputs.version }}.tar.gz

    # Upload Release Assets
    - name: Upload Frontend Build
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./frontend-${{ needs.create-release.outputs.version }}.tar.gz
        asset_name: frontend-${{ needs.create-release.outputs.version }}.tar.gz
        asset_content_type: application/gzip

    - name: Upload Backend Docker Image
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./backend-${{ needs.create-release.outputs.version }}.tar.gz
        asset_name: backend-${{ needs.create-release.outputs.version }}.tar.gz
        asset_content_type: application/gzip

  deploy-production:
    runs-on: ubuntu-latest
    needs: [create-release, build-and-release]
    environment: production

    steps:
    - name: Deploy to Production
      run: |
        echo "🚀 Deploying release ${{ needs.create-release.outputs.version }} to production"
        echo "This would trigger your production deployment process"
        # Add your production deployment commands here
