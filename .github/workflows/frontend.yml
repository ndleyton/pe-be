name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'pe-be-tracker-frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'pe-be-tracker-frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read
  actions: read

defaults:
  run:
    working-directory: ./pe-be-tracker-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./pe-be-tracker-frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run linting
        run: npm run lint
        
      - name: Run type checking
        run: npx tsc --noEmit
        
      - name: Run tests
        run: npm run test -- --coverage
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_TIMEOUT: 10000
          VITE_ENABLE_LOGGING: false

      # Install Playwright browsers and dependencies
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Run end-to-end tests with Playwright
      - name: Run E2E tests
        run: |
          npm run dev &
          npx wait-on http://localhost:5173
          npm run test:e2e
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_TIMEOUT: 10000
          VITE_ENABLE_LOGGING: false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./pe-be-tracker-frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./pe-be-tracker-frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      #      - name: Upload build artifacts
#        uses: actions/upload-artifact@v4
#        with:
#          name: frontend-build
#          path: ./pe-be-tracker-frontend/dist/
#          retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
#      - name: Download build artifacts
#        uses: actions/download-artifact@v4
#        with:
#          name: frontend-build
#          path: ./dist
          
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying frontend to staging environment"
          echo "Build files available in ./dist"
          # Add your staging deployment commands here
          # Example: rsync, AWS S3, Netlify, Vercel, etc.
        
  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
