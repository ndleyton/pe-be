name: Frontend E2E (with Backend)

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      # Limit this heavy workflow to files that can affect the app runtime or E2E harness.
      - 'backend/src/**'
      - 'backend/alembic/**'
      - 'backend/main.py'
      - 'backend/alembic.ini'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
      - 'pe-be-tracker-frontend/src/**'
      - 'pe-be-tracker-frontend/e2e/**'
      - 'pe-be-tracker-frontend/public/**'
      - 'pe-be-tracker-frontend/index.html'
      - 'pe-be-tracker-frontend/package.json'
      - 'pe-be-tracker-frontend/pnpm-lock.yaml'
      - 'pe-be-tracker-frontend/playwright.config.ts'
      - 'pe-be-tracker-frontend/vite.config.js'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ${{ fromJSON(vars.HEAVY_RUNNER_LABELS_JSON != '' && vars.HEAVY_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pe_be_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv and venv (backend)
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            ~/.cache/uv
          key: uv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/uv.lock') }}

      - name: Verify lockfile is up-to-date
        working-directory: backend
        run: uv lock --check

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Create backend .env.test
        run: |
          cat > backend/.env.test <<'EOF'
          ENVIRONMENT=development
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/pe_be_test
          FRONTEND_URL=http://127.0.0.1:5173
          EOF

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pe_be_test
        run: uv run alembic upgrade head

      - name: Start backend
        working-directory: backend
        env:
          ENV_FILE: .env.test
        run: |
          nohup uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 >/tmp/backend.log 2>&1 &
          sleep 3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pe-be-tracker-frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: pe-be-tracker-frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pe-be-tracker-frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        working-directory: pe-be-tracker-frontend
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BROWSERS="chromium"
          else
            BROWSERS="chromium firefox webkit"
          fi

          if [ "$RUNNER_ENVIRONMENT" = "self-hosted" ]; then
            pnpm exec playwright install $BROWSERS
          else
            pnpm exec playwright install --with-deps $BROWSERS
          fi

      - name: Start frontend dev server
        working-directory: pe-be-tracker-frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
        run: |
          nohup pnpm run dev:test >/tmp/frontend.log 2>&1 &
          timeout=60
          elapsed=0
          ready=0
          while [ $elapsed -lt $timeout ]; do
            if curl -fsS http://localhost:5173 > /dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          if [ "$ready" -ne 1 ]; then
            echo "Timeout waiting for frontend dev server"
            exit 1
          fi

      - name: Run frontend E2E tests
        working-directory: pe-be-tracker-frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pe-be-tracker-frontend/playwright-report
          if-no-files-found: ignore
