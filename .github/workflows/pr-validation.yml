name: PR Validation

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Check for changes
      uses: dorny/paths-filter@v3
      id: changes
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        filters: |
          frontend:
            - 'pe-be-tracker-frontend/**'
          backend:
            - 'backend/**'

  validate-pr:
    runs-on: ubuntu-latest
    needs: changes
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate PR title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
          revert
        requireScope: false
        
    - name: Check for sensitive files
      run: |
        echo "🔍 Checking for sensitive files..."
        
        # Check for common sensitive files
        if find . -name "*.env" -not -path "./.git/*" | grep -q .; then
          echo "❌ Found .env files that should not be committed"
          find . -name "*.env" -not -path "./.git/*"
          exit 1
        fi
        
        if find . -name "*.key" -not -path "./.git/*" -not -path "./node_modules/*" | grep -q .; then
          echo "❌ Found .key files that should not be committed"
          find . -name "*.key" -not -path "./.git/*" -not -path "./node_modules/*"
          exit 1
        fi
        
        if find . -name "*.pem" -not -path "./.git/*" -not -path "./node_modules/*" | grep -q .; then
          echo "❌ Found .pem files that should not be committed"
          find . -name "*.pem" -not -path "./.git/*" -not -path "./node_modules/*"
          exit 1
        fi
        
        echo "✅ No sensitive files found"

  integration-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && needs.changes.outputs.backend == 'true'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: pe_be_integration_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        pip install poetry
        poetry install --no-interaction
        
    - name: Install frontend dependencies
      working-directory: ./pe-be-tracker-frontend
      run: npm ci
      
    - name: Start backend server
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pe_be_integration_test
        SECRET_KEY: test-secret-key-for-integration
        ENVIRONMENT: test
      run: |
        poetry run alembic upgrade head
        poetry run uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 10
        
    - name: Build frontend
      working-directory: ./pe-be-tracker-frontend
      run: npm run build
      
    - name: Run integration tests
      run: |
        echo "🧪 Running integration tests..."
        # Test that backend is responding
        curl -f http://localhost:8000/docs || exit 1
        echo "✅ Backend health check passed"
        
        # Add more integration tests here
        echo "✅ Integration tests completed"