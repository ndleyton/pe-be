name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: gym_tracker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Cache uv and venv (backend)
      uses: actions/cache@v4
      with:
        path: |
          backend/.venv
          ~/.cache/uv
        key: uv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/uv.lock') }}

    - name: Verify lockfile is up-to-date
      run: uv lock --check

    - name: Install dependencies
      run: uv sync

    - name: Verify exactly one Alembic head
      run: |
        heads_output="$(uv run alembic heads)"
        printf '%s\n' "$heads_output"

        head_count="$(printf '%s\n' "$heads_output" | awk '/\(head\)/ {count++} END {print count+0}')"
        if [ "$head_count" -ne 1 ]; then
          echo "Expected exactly one Alembic head, found $head_count"
          exit 1
        fi

    - name: Run ruff linting
      run: uv run ruff check src/ tests/

    - name: Run ruff formatting check
      run: uv run ruff format --check src/ tests/

    - name: Create test database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE gym_tracker_test;" || echo "Database might already exist"

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_tracker_test
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: test
        GOOGLE_CLIENT_ID: test-google-client-id-ci
        GOOGLE_CLIENT_SECRET: test-google-client-secret-ci
        GOOGLE_REDIRECT_URI: http://localhost:3000/auth/callback
      run: |
        uv run alembic upgrade head

    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_tracker_test
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: test
        GOOGLE_CLIENT_ID: test-google-client-id-ci
        GOOGLE_CLIENT_SECRET: test-google-client-secret-ci
        GOOGLE_REDIRECT_URI: http://localhost:3000/auth/callback
      run: uv run pytest -v --cov=src --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Cache uv and venv (backend)
      uses: actions/cache@v4
      with:
        path: |
          backend/.venv
          ~/.cache/uv
        key: uv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/uv.lock') }}

    - name: Verify lockfile is up-to-date
      working-directory: ./backend
      run: uv lock --check

    - name: Install dependencies
      working-directory: ./backend
      run: uv sync

    - name: Run security scan with bandit
      working-directory: ./backend
      run: |
        uvx "bandit[toml]" -r src/ -f json -o bandit-report.json || true

    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan
        path: ./backend/bandit-report.json
      continue-on-error: true

  build:
    runs-on: ${{ fromJSON(vars.HEAVY_RUNNER_LABELS_JSON != '' && vars.HEAVY_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    needs: test
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Cache uv and venv (backend)
      uses: actions/cache@v4
      with:
        path: |
          backend/.venv
          ~/.cache/uv
        key: uv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/uv.lock') }}

    - name: Verify lockfile is up-to-date
      working-directory: ./backend
      run: uv lock --check

    - name: Install dependencies
      working-directory: ./backend
      run: uv sync --frozen

    - name: Validate application
      working-directory: ./backend
      env:
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: test
        GOOGLE_CLIENT_ID: test-google-client-id-ci
        GOOGLE_CLIENT_SECRET: test-google-client-secret-ci
        GOOGLE_REDIRECT_URI: http://localhost:3000/auth/callback
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_tracker_test
      run: |
        # Validate that the application can start
        uv run python -c "from src.main import app; print('✅ App imports successfully')"

    - name: Build Docker image
      working-directory: ./backend
      run: |
        docker build -t pe-be-backend:latest .

    - name: Save Docker image
      working-directory: ./backend
      run: |
        docker save pe-be-backend:latest | gzip > backend-image.tar.gz

