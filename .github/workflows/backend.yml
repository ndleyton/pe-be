name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read
  actions: read

defaults:
  run:
    working-directory: ./backend

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: pe_be_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: ./backend/.venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
        
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root
      
    - name: Install project
      run: poetry install --no-interaction
      
    - name: Install coverage dependencies
      run: poetry add --group dev pytest-cov
      
    - name: Create test database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE pe_be_test;" || echo "Database might already exist"
        
    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pe_be_test
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: test
        GOOGLE_CLIENT_ID: test-google-client-id-ci
        GOOGLE_CLIENT_SECRET: test-google-client-secret-ci
      run: |
        poetry run alembic upgrade head
        
    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pe_be_test
        SECRET_KEY: test-secret-key-for-ci
        ENVIRONMENT: test
        GOOGLE_CLIENT_ID: test-google-client-id-ci
        GOOGLE_CLIENT_SECRET: test-google-client-secret-ci
      run: poetry run pytest -v --cov=app --cov-report=xml
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        
    - name: Install dependencies
      working-directory: ./backend
      run: poetry install --no-interaction
      
    - name: Run security scan with bandit
      working-directory: ./backend
      run: |
        poetry add bandit[toml] --group dev
        poetry run bandit -r app/ -f json -o bandit-report.json || true
        
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan
        path: ./backend/bandit-report.json
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Install dependencies
      working-directory: ./backend
      run: poetry install --no-interaction
        
    - name: Validate application
      working-directory: ./backend
      run: |
        # Validate that the application can start
        poetry run python -c "from src.main import app; print('✅ App imports successfully')"
        
        # Validate that all dependencies are satisfied
        poetry check
        
    - name: Build Docker image
      working-directory: ./backend
      run: |
        docker build -t pe-be-backend:latest .
        
    - name: Save Docker image
      working-directory: ./backend
      run: |
        docker save pe-be-backend:latest | gzip > backend-image.tar.gz
        
    #    - name: Upload Docker image
#      uses: actions/upload-artifact@v4
#      with:
#        name: backend-docker-image
#        path: ./backend/backend-image.tar.gz
#        retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    #    - name: Download Docker image
#      uses: actions/download-artifact@v4
#      with:
#        name: backend-docker-image
        
    #    - name: Load Docker image
#      run: |
#        docker load < backend-image.tar.gz
        
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying backend to staging environment"
        echo "Docker image loaded: pe-be-backend:latest"
        # Add your staging deployment commands here
        # Example: docker push, kubectl apply, AWS ECS, etc.
        
  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      #      - name: Download Docker image
#        uses: actions/download-artifact@v4
#        with:
#          name: backend-docker-image
          
      #      - name: Load Docker image
#        run: |
#          docker load < backend-image.tar.gz
          
      - name: Setup deployment environment
        run: |
          echo "🔧 Setting up production deployment environment"
          docker images | grep pe-be-backend
          
      - name: Deploy to production
        env:
          # Add your production environment variables here
          DOCKER_IMAGE: pe-be-backend:latest
        run: |
          echo "🚀 Deploying backend to production environment"
          echo "Docker image loaded: $DOCKER_IMAGE"
          
